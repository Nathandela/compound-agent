name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  goreleaser-check:
    name: Validate GoReleaser Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: go

  go-test:
    name: Go Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Run tests
        working-directory: go
        run: go test ./...

      - name: Run vet
        working-directory: go
        run: go vet ./...

  go-build:
    name: Go Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Build
        working-directory: go
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build \
            -ldflags="-s -w -X github.com/nathandelacretaz/compound-agent/internal/build.Version=ci-${{ github.sha }}" \
            -o "dist/ca-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/ca

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ca-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go/dist/ca-${{ matrix.goos }}-${{ matrix.goarch }}*

  rust-build:
    name: Rust Embed Daemon (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ca-embed-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ca-embed-linux-arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ca-embed-darwin-arm64
          # x86_64 macOS: no native runner available, ort-sys can't cross-compile.
          # Intel Mac users run the arm64 embed binary via Rosetta.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust/embed-daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp rust/embed-daemon/target/${{ matrix.target }}/release/ca-embed dist/${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

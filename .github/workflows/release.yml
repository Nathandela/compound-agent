name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-rust:
    name: Build Rust Daemon (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ca-embed-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ca-embed-linux-arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ca-embed-darwin-arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: ca-embed-darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust/embed-daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp rust/embed-daemon/target/${{ matrix.target }}/release/ca-embed dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  goreleaser:
    name: GoReleaser
    needs: [build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust-artifacts
          pattern: ca-embed-*
          merge-multiple: true

      - name: GoReleaser
        uses: goreleaser/goreleaser-cross-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

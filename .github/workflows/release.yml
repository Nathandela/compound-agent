name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-go:
    name: Build Go CLI (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cc: gcc
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
          - runner: macos-13
            goos: darwin
            goarch: amd64
            cc: clang
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Build release binary
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          go build -tags sqlite_fts5 \
            -ldflags="-s -w \
              -X github.com/nathandelacretaz/compound-agent/internal/build.Version=${VERSION} \
              -X github.com/nathandelacretaz/compound-agent/internal/build.Commit=${COMMIT}" \
            -o dist/ca-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/ca

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ca-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go/dist/ca-${{ matrix.goos }}-${{ matrix.goarch }}

  build-rust:
    name: Build Rust Daemon (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ca-embed-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ca-embed-linux-arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ca-embed-darwin-arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: ca-embed-darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust/embed-daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp rust/embed-daemon/target/${{ matrix.target }}/release/ca-embed dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build-go, build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ca-darwin-arm64/ca-darwin-arm64
            dist/ca-darwin-amd64/ca-darwin-amd64
            dist/ca-linux-amd64/ca-linux-amd64
            dist/ca-linux-arm64/ca-linux-arm64
            dist/ca-embed-darwin-arm64/ca-embed-darwin-arm64
            dist/ca-embed-darwin-amd64/ca-embed-darwin-amd64
            dist/ca-embed-linux-amd64/ca-embed-linux-amd64
            dist/ca-embed-linux-arm64/ca-embed-linux-arm64

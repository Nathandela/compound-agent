name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-rust:
    name: Build Rust Daemon (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ca-embed-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ca-embed-linux-arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ca-embed-darwin-arm64
          # x86_64 macOS: no native runner available, ort-sys can't cross-compile.
          # Intel Mac users run the arm64 binary via Rosetta.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust/embed-daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp rust/embed-daemon/target/${{ matrix.target }}/release/ca-embed dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  goreleaser:
    name: GoReleaser
    needs: [build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust-artifacts
          pattern: ca-embed-*
          merge-multiple: true

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-cross
          version: "~> v1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download release binaries
        run: |
          mkdir -p release-bins
          # Go CLI binary: all 4 platforms (cross-compiled by GoReleaser)
          for P in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            gh release download "${GITHUB_REF_NAME}" \
              --pattern "ca-${P}" \
              --dir release-bins
          done
          # Rust embed daemon: 3 platforms (no x86_64 macOS — Intel uses Rosetta)
          for P in darwin-arm64 linux-amd64 linux-arm64; do
            gh release download "${GITHUB_REF_NAME}" \
              --pattern "ca-embed-${P}" \
              --dir release-bins
          done
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "checksums.txt" \
            --dir release-bins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify checksums
        run: |
          cd release-bins
          sha256sum --check --ignore-missing checksums.txt
          echo "All checksums verified."

      - name: Publish platform packages
        run: node scripts/publish-platforms.cjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-go:
    name: Build Go CLI (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            artifact: ca-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cc: gcc
            artifact: ca-linux-arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            artifact: ca-darwin-arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
            artifact: ca-darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::7}"
          go build -tags sqlite_fts5 \
            -ldflags="-s -w -X github.com/nathandelacretaz/compound-agent/internal/build.Version=${VERSION} -X github.com/nathandelacretaz/compound-agent/internal/build.Commit=${COMMIT}" \
            -o "../dist/${{ matrix.artifact }}" \
            ./cmd/ca

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-rust:
    name: Build Rust Daemon (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ca-embed-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ca-embed-linux-arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ca-embed-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust/embed-daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp rust/embed-daemon/target/${{ matrix.target }}/release/ca-embed dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [build-go, build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum ca-* > checksums.txt
          cat checksums.txt

      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            release-artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download release binaries
        run: |
          mkdir -p release-bins
          for P in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            gh release download "${GITHUB_REF_NAME}" \
              --pattern "ca-${P}" \
              --dir release-bins
          done
          # Rust embed daemon: 3 platforms (no x86_64 macOS — Intel uses Rosetta)
          for P in darwin-arm64 linux-amd64 linux-arm64; do
            gh release download "${GITHUB_REF_NAME}" \
              --pattern "ca-embed-${P}" \
              --dir release-bins
          done
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "checksums.txt" \
            --dir release-bins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify checksums
        run: |
          cd release-bins
          sha256sum --check --ignore-missing checksums.txt
          echo "All checksums verified."

      - name: Publish platform packages
        run: node scripts/publish-platforms.cjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

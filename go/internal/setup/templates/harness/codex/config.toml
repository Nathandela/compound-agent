# Compound Agent - Codex configuration
# Codex reads AGENTS.md natively for the lesson-capture workflow; this file pins
# the project conventions and the in-prompt soft phase-gate protocol that complement
# it. (A future enhancement could enforce the gate with a codex PreToolUse hook; no
# hard hook is wired today.)

[compound-agent]
version = "{{VERSION}}"

# Completion markers the loop detects from Codex output.
# Print exactly one on its own line when an epic terminates:
#   EPIC_COMPLETE / HUMAN_REQUIRED: <reason> / EPIC_FAILED
markers = ["EPIC_COMPLETE", "HUMAN_REQUIRED", "EPIC_FAILED"]

# --- Compound Protocol (soft phase-gate, in-memory) ---
#
# Mandatory Recall
#   Call `ca search "query"` and `ca knowledge "query"` BEFORE each phase, before
#   every architectural decision, before re-implementing a known pattern, and after
#   a correction. Past mistakes repeat when search is skipped.
#
# Phase Gates
#   Drive epics through the cook-it phases in order: plan -> work -> review ->
#   compound. Do not skip a phase. Initialize once with
#   `ca phase-check init <epic>`; start each phase with
#   `ca phase-check start <phase>` and gate the transition before moving on:
#     - After plan:   `ca phase-check gate post-plan`
#     - After work:   `ca phase-check gate gate-3`
#     - After review: `ca phase-check gate gate-4`
#     - Before done:  `ca verify-gates <epic>` (must pass) + the quality gates
#                     (test, lint, build), then `ca phase-check gate final`.
#   If a gate fails, DO NOT proceed. Fix the issue first.
#
# Verification Contract
#   The per-epic spec is a FILE at docs/specs/<epic-id>-<slug>.md and is the single
#   source of truth. Resolve it from the epic's `Spec:` pointer via `bd show <epic>`
#   (legacy fallback: the epic description for older epics). The `## Verification
#   Contract` appended to the spec file during plan defines what "done" means:
#   product profile, touched surfaces, principal risks, and required evidence. Do not
#   invent "done" late in the cycle. If the contract is missing, go back to plan.
#
# Capture Protocol
#   Run `ca learn "insight"` AFTER a correction, after a test fail -> fix -> pass
#   cycle, or when you discover project-specific knowledge. Never edit
#   .claude/lessons/index.jsonl directly.

# Codex does not auto-commit; the epic must commit and push explicitly before
# printing EPIC_COMPLETE:
#   git add -A && git commit -m "<message>" && git push
